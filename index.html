<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MİHENK Portal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --p1:#004FA3;--p2:#0076CC;--p3:#3D9EE8;--p4:#C8DFEF;--p5:#E4F0FA;--p6:#F2F7FC;
  --white:#fff;--text:#0A2540;--muted:#3D5A7A;--hint:#7A9AB8;--border:#BACED9;
  --green:#1A6B3C;--green-bg:#E2F4EB;--red:#A32D2D;--red-bg:#FCEBEB;
  --amber:#854F0B;--amber-bg:#FAEEDA;--navy:#1a1a2e;
  --r:8px;--rl:12px;--rxl:16px;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:var(--text);background:var(--p6);overflow:hidden}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--p4);border-radius:8px}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;background:var(--p2);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .6s ease;overflow:hidden}
#splash.out{opacity:0;pointer-events:none}
#splash canvas{position:absolute;inset:0;pointer-events:none}
.sp-corner{position:absolute;width:36px;height:36px;border-color:rgba(255,255,255,.55);border-style:solid;opacity:0;animation:cIn .4s ease forwards}
.sp-corner.tl{top:22px;left:22px;border-width:2px 0 0 2px;animation-delay:.15s}
.sp-corner.tr{top:22px;right:22px;border-width:2px 2px 0 0;animation-delay:.2s}
.sp-corner.bl{bottom:22px;left:22px;border-width:0 0 2px 2px;animation-delay:.25s}
.sp-corner.br{bottom:22px;right:22px;border-width:0 2px 2px 0;animation-delay:.3s}
@keyframes cIn{to{opacity:1}}
.sp-center{position:relative;z-index:10;display:flex;flex-direction:column;align-items:center}
.sp-logo-wrap{position:relative;opacity:0;transform:scale(.72) translateY(16px);animation:lgIn .85s cubic-bezier(.16,1,.3,1) .55s forwards}
@keyframes lgIn{to{opacity:1;transform:scale(1) translateY(0)}}
.sp-sweep{position:absolute;inset:0;border-radius:8px;background:var(--p2);transform:translateX(-3%);animation:swp .65s cubic-bezier(.77,0,.18,1) .28s forwards}
@keyframes swp{to{transform:translateX(107%)}}
.sp-logo-wrap img{width:270px;border-radius:8px;display:block}
.sp-tag{font-size:11px;letter-spacing:3.5px;color:rgba(255,255,255,0);margin-top:22px;text-transform:uppercase;animation:tgIn .55s ease 1.25s forwards}
@keyframes tgIn{to{color:rgba(255,255,255,.6)}}
.sp-bar-outer{margin-top:42px;width:210px;height:2px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;opacity:0;animation:bfIn .3s ease .95s forwards}
.sp-bar-inner{height:100%;width:0%;background:#fff;border-radius:2px;animation:bFill 1.7s cubic-bezier(.4,0,.2,1) 1.05s forwards}
@keyframes bfIn{to{opacity:1}}
@keyframes bFill{0%{width:0%}55%{width:72%}82%{width:88%}100%{width:100%}}
.sp-pct{font-size:10px;color:rgba(255,255,255,0);letter-spacing:.5px;margin-top:9px;animation:tgIn .4s ease 1.0s forwards}

/* ── LOGIN ── */
#login-page{display:none;height:100vh;align-items:center;justify-content:center;background:var(--p6)}
#login-page.show{display:flex}
.lcard{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:44px 40px;width:400px}
.lcard img{width:200px;border-radius:8px;display:block;margin:0 auto 14px}
.lcard-sub{text-align:center;font-size:11px;color:var(--hint);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:30px}
.lf-label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px;letter-spacing:.3px;text-transform:uppercase}
.lf-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r);font-size:14px;color:var(--text);background:var(--p6);outline:none;transition:border-color .15s;margin-bottom:16px}
.lf-input:focus{border-color:var(--p2);background:var(--white)}
.rem-row{display:flex;align-items:center;gap:9px;margin-bottom:22px;cursor:pointer}
.rem-box{width:18px;height:18px;border:1.5px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;background:var(--white);transition:all .15s;flex-shrink:0}
.rem-box.on{background:var(--p2);border-color:var(--p2)}
.rem-box svg{width:10px;height:10px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;opacity:0;transition:opacity .15s}
.rem-box.on svg{opacity:1}
.rem-lbl{font-size:13px;color:var(--muted);user-select:none}
.login-btn{width:100%;padding:13px;background:var(--p2);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:700;cursor:pointer;transition:background .15s}
.login-btn:hover{background:var(--p1)}
.login-err{color:var(--red);font-size:12px;text-align:center;margin-top:12px;min-height:18px}
.login-hint{text-align:center;font-size:11px;color:var(--hint);margin-top:18px}

/* ── SHARED APP CHROME ── */
#bayi-app,#admin-app{display:none;height:100vh;flex-direction:column}
#bayi-app.show,#admin-app.show{display:flex}
.topnav{background:var(--p2);height:52px;display:flex;align-items:center;padding:0 20px;gap:14px;flex-shrink:0;border-bottom:2px solid var(--p1)}
.topnav img{height:28px;border-radius:4px}
.tn-div{width:1px;height:20px;background:rgba(255,255,255,.2)}
.tn-tab{padding:5px 15px;border-radius:20px;border:1px solid transparent;background:transparent;color:rgba(255,255,255,.6);font-size:13px;cursor:pointer;transition:all .15s}
.tn-tab:hover{background:rgba(255,255,255,.1);color:#fff}
.tn-tab.on{background:rgba(255,255,255,.18);color:#fff;border-color:rgba(255,255,255,.25)}
.tn-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.tn-av{width:30px;height:30px;border-radius:50%;background:var(--p5);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--p1)}
.tn-name{font-size:12px;font-weight:600;color:#fff;line-height:1.3}
.tn-sub{font-size:10px;color:rgba(255,255,255,.55)}
.isk-pill{background:var(--green-bg);color:var(--green);font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px}
.admin-pill{background:rgba(255,255,255,.15);color:#fff;font-size:10px;font-weight:700;padding:2px 9px;border-radius:10px;border:1px solid rgba(255,255,255,.3)}
.exit-btn{padding:5px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.25);background:transparent;color:rgba(255,255,255,.65);font-size:12px;cursor:pointer;transition:all .15s}
.exit-btn:hover{background:rgba(255,255,255,.1);color:#fff}

/* ── BAYI PORTAL ── */
.workspace{flex:1;display:flex;overflow:hidden}
.sidebar{width:224px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sb-head{padding:13px 14px 10px;border-bottom:1px solid var(--border)}
.sb-lbl{font-size:10px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.8px}
.sb-srch{display:flex;align-items:center;gap:7px;border:1px solid var(--border);border-radius:var(--r);padding:7px 10px;margin:10px 10px 0;background:var(--p6)}
.sb-srch svg{width:13px;height:13px;stroke:var(--hint);fill:none;stroke-width:2;flex-shrink:0}
.sb-srch input{border:none;background:transparent;font-size:12px;color:var(--text);outline:none;width:100%}
.kat-list{flex:1;overflow-y:auto;padding:8px}
.kat-row{display:flex;align-items:center}
.chev{width:24px;height:34px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--hint);flex-shrink:0;transition:transform .15s}
.chev.open{transform:rotate(90deg)}
.chev svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2.5;stroke-linecap:round}
.kb{flex:1;display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--r);border:none;background:transparent;cursor:pointer;text-align:left;transition:background .12s}
.kb:hover{background:var(--p5)}
.kb.on{background:var(--p4)}
.kb.on .kn{color:var(--p1);font-weight:600}
.kb.on .kc{background:var(--p2);color:#fff}
.ki{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.kn{font-size:12px;color:var(--text);flex:1}
.kc{font-size:10px;background:var(--p5);color:var(--muted);padding:1px 6px;border-radius:8px;font-weight:600}
.alt-row{padding-left:24px}
.mid{width:350px;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--p6);flex-shrink:0}
.mid-head{padding:13px 14px;background:var(--white);border-bottom:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:9px}
.mid-head h2{font-size:13px;font-weight:700;color:var(--text)}
.msrch{display:flex;align-items:center;gap:7px;border:1px solid var(--border);border-radius:var(--r);padding:7px 10px;background:var(--p6)}
.msrch svg{width:13px;height:13px;stroke:var(--hint);fill:none;stroke-width:2;flex-shrink:0}
.msrch input{border:none;background:transparent;font-size:12px;color:var(--text);outline:none;width:100%}
.mid-count{font-size:11px;color:var(--hint)}
.mid-list{flex:1;overflow-y:auto;padding:10px}
.prow{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:12px;margin-bottom:7px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:all .12s}
.prow:hover{border-color:var(--p3)}
.prow.sel{border-color:var(--p2);background:var(--p5)}
.prow.sel .pad{color:var(--p1)}
.pleft{flex:1;min-width:0;margin-right:10px}
.pad{font-size:12px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.pkod{font-size:10px;color:var(--hint);font-family:monospace;margin-bottom:5px}
.ppill{display:inline-block;font-size:10px;padding:2px 7px;background:var(--p4);color:var(--p1);border-radius:4px;font-weight:600}
.pright{text-align:right;flex-shrink:0}
.plist{font-size:10px;color:var(--hint);text-decoration:line-through}
.pnet{font-size:14px;font-weight:700;color:var(--p2)}
.pisk{font-size:10px;color:var(--green);background:var(--green-bg);padding:2px 5px;border-radius:3px;margin-top:3px;display:inline-block;font-weight:600}
.detail{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--p6)}
.det-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.det-empty .ei{font-size:48px;opacity:.12;color:var(--p2)}
.det-empty p{font-size:14px;color:var(--hint)}
.det-scroll{flex:1;overflow-y:auto}
.d-imgbox{height:150px;background:var(--white);border-bottom:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;flex-shrink:0}
.d-imgicon{font-size:40px;color:var(--border)}
.d-imgkod{font-size:10px;color:var(--hint);font-family:monospace}
.d-body{padding:22px 26px;display:flex;flex-direction:column;gap:16px}
.d-title{font-size:18px;font-weight:700;color:var(--p1);line-height:1.3}
.d-badge{display:inline-block;background:var(--p4);color:var(--p1);font-size:11px;font-weight:700;padding:3px 10px;border-radius:4px}
.fbox{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:18px}
.frow{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.flabel{font-size:10px;color:var(--hint);margin-bottom:3px;font-weight:600}
.fval{font-size:13px;color:var(--hint);text-decoration:line-through}
.isk-box{background:var(--p4);border-radius:var(--r);padding:10px 16px;text-align:center;min-width:72px}
.isk-pct{font-size:20px;font-weight:700;color:var(--p1)}
.isk-lbl{font-size:10px;color:var(--muted);margin-top:2px}
.sep{height:1px;background:var(--border);margin:14px 0}
.net-label{font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:600}
.net-val{font-size:28px;font-weight:700;color:var(--p2)}
.kazanc{font-size:12px;color:var(--green);margin-top:6px}
.specs{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.spec-title{font-size:10px;font-weight:700;color:var(--hint);text-transform:uppercase;letter-spacing:.5px;padding:11px 14px;border-bottom:1px solid var(--border)}
.spec-row{display:flex;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px}
.spec-row:last-child{border-bottom:none}
.sl{color:var(--muted)}
.sv{font-weight:600;color:var(--text)}
.profil-page{flex:1;overflow-y:auto;padding:32px;display:flex;justify-content:center}
.profil-wrap{width:100%;max-width:520px}
.profil-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:28px;text-align:center;margin-bottom:18px}
.profil-av{width:64px;height:64px;border-radius:50%;background:var(--p4);display:inline-flex;align-items:center;justify-content:center;font-size:22px;font-weight:700;color:var(--p1);margin-bottom:12px}
.profil-firma{font-size:19px;font-weight:700;color:var(--p1)}
.profil-user{font-size:13px;color:var(--muted);margin-top:4px}
.info-box{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:18px}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:13px 18px;border-bottom:1px solid var(--border);font-size:13px}
.info-row:last-child{border-bottom:none}
.ir-label{color:var(--muted)}
.logout-btn{width:100%;padding:13px;border:1px solid #F7C1C1;border-radius:var(--r);color:var(--red);background:transparent;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s}
.logout-btn:hover{background:var(--red-bg)}
.badge-green{background:var(--green-bg);color:var(--green);padding:3px 9px;border-radius:4px;font-size:11px;font-weight:700}
.badge-blue{background:var(--p4);color:var(--p1);padding:3px 9px;border-radius:4px;font-size:11px;font-weight:700}
.empty{text-align:center;padding:40px 20px;color:var(--hint);font-size:13px}

/* ── ADMIN PORTAL ── */
.admin-layout{flex:1;display:flex;overflow:hidden}
.admin-sidebar{width:220px;background:var(--navy);display:flex;flex-direction:column;flex-shrink:0}
.admin-nav-section{font-size:10px;color:rgba(255,255,255,.25);padding:16px 18px 6px;text-transform:uppercase;letter-spacing:1px}
.admin-nav-item{display:flex;align-items:center;gap:10px;padding:11px 18px;cursor:pointer;color:rgba(255,255,255,.55);font-size:13px;transition:all .15s;border-left:3px solid transparent;border:none;background:transparent;width:100%;text-align:left}
.admin-nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85)}
.admin-nav-item.on{background:rgba(255,255,255,.10);color:#fff;border-left:3px solid #378ADD}
.admin-nav-item svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;flex-shrink:0}
.admin-footer{margin-top:auto;padding:14px 18px;border-top:1px solid rgba(255,255,255,.08)}
.admin-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.admin-topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.admin-topbar h1{font-size:16px;font-weight:600;color:var(--text)}
.admin-actions{display:flex;gap:8px;align-items:center}
.admin-page{padding:24px;flex:1;overflow-y:auto}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text);transition:all .15s;white-space:nowrap}
.btn:hover{background:var(--p6)}
.btn-primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn-primary:hover{opacity:.88}
.btn-danger{color:var(--red);border-color:#F7C1C1}
.btn-danger:hover{background:var(--red-bg)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);padding:16px}
.stat-card .label{font-size:12px;color:var(--muted);margin-bottom:6px}
.stat-card .value{font-size:24px;font-weight:700;color:var(--text)}
.stat-card .sub{font-size:11px;color:var(--hint);margin-top:4px}
.table-wrap{background:var(--white);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.table-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.table-header h2{font-size:14px;font-weight:600}
.search-input{display:flex;align-items:center;gap:8px;border:1px solid var(--border);border-radius:var(--r);padding:7px 10px;background:var(--p6)}
.search-input svg{width:14px;height:14px;fill:none;stroke:var(--hint);stroke-width:2;flex-shrink:0}
.search-input input{border:none;background:transparent;font-size:13px;color:var(--text);outline:none;width:180px}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:600;color:var(--muted);padding:10px 16px;border-bottom:1px solid var(--border);background:var(--p6);text-transform:uppercase;letter-spacing:.5px}
td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--p6)}
.td-actions{display:flex;gap:6px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge-bgreen{background:var(--green-bg);color:var(--green)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-bblue{background:var(--p4);color:var(--p1)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.overlay.hidden{display:none}
.modal{background:var(--white);border-radius:var(--rl);width:100%;max-width:480px;overflow:hidden}
.modal-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:15px;font-weight:600}
.modal-close{background:none;border:none;cursor:pointer;color:var(--muted);font-size:20px;line-height:1;padding:2px 6px}
.modal-body{padding:20px}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--text);background:var(--white);outline:none;transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--p2)}
.field textarea{resize:vertical;min-height:72px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-hint{font-size:11px;color:var(--hint);margin-top:4px}
.tree-item{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-radius:var(--r);transition:background .1s}
.tree-item:hover{background:var(--p6)}
.tree-item .left{display:flex;align-items:center;gap:8px}
.kat-name{font-size:13px;font-weight:500}
.kat-sub{font-size:11px;color:var(--hint);margin-top:1px}
.drop-zone{border:2px dashed var(--border);border-radius:var(--rl);padding:32px;text-align:center;cursor:pointer;transition:all .15s;background:var(--p6)}
.drop-zone:hover,.drop-zone.drag{border-color:var(--p2);background:var(--p5)}
.drop-zone svg{width:32px;height:32px;fill:none;stroke:var(--hint);stroke-width:1.5;margin-bottom:10px}
.import-preview{margin-top:16px;max-height:200px;overflow-y:auto}
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--navy);color:#fff;padding:10px 16px;border-radius:var(--r);font-size:13px;animation:slideIn .2s ease;display:flex;align-items:center;gap:8px}
.toast.success{background:#085041}
.toast.error{background:#791F1F}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
.empty-state{text-align:center;padding:48px 20px;color:var(--hint)}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200}
.confirm-overlay.hidden{display:none}
.confirm-box{background:var(--white);border-radius:var(--rl);width:380px;overflow:hidden}
.confirm-icon{display:flex;align-items:center;justify-content:center;padding:28px 0 16px}
.confirm-icon .circle{width:52px;height:52px;border-radius:50%;background:var(--red-bg);display:flex;align-items:center;justify-content:center}
.confirm-icon svg{width:24px;height:24px;fill:none;stroke:var(--red);stroke-width:2;stroke-linecap:round}
.confirm-body{padding:0 24px 20px;text-align:center}
.confirm-body h3{font-size:15px;font-weight:600;margin-bottom:8px}
.confirm-body p{font-size:13px;color:var(--muted);line-height:1.5}
.confirm-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
</style>
</head>

// SPLASH CANVAS
// ══════════════════════════════════════════════════════════════════════════════
(function(){
  const canvas=document.getElementById('sp-canvas');
  const ctx=canvas.getContext('2d');
  const splash=document.getElementById('splash');
  function resize(){canvas.width=splash.offsetWidth||window.innerWidth;canvas.height=splash.offsetHeight||window.innerHeight;}
  resize(); window.addEventListener('resize',resize);
  const pts=[];
  for(let i=0;i<60;i++) pts.push({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,vy:-(0.18+Math.random()*.52),vx:(Math.random()-.5)*.14,r:.4+Math.random()*1.9,a:.05+Math.random()*.18,life:0,max:200+Math.random()*380,sq:Math.random()>.62});
  let t=0;
  function frame(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle='rgba(255,255,255,.038)';ctx.lineWidth=1;
    for(let x=0;x<canvas.width;x+=60){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}
    for(let y=0;y<canvas.height;y+=60){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}
    const cx=canvas.width/2,cy=canvas.height/2;
    [140,230,320].forEach((br,i)=>{const r=br+Math.sin(t*.0007+i)*7;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle=`rgba(255,255,255,${.028-i*.007})`;ctx.lineWidth=1;ctx.stroke();});
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.life++;
      if(p.life>p.max||p.y<-8){p.x=Math.random()*canvas.width;p.y=canvas.height+10;p.life=0;p.max=200+Math.random()*380;}
      const fade=Math.min(1,p.life/70)*Math.min(1,(p.max-p.life)/70);
      ctx.save();ctx.globalAlpha=p.a*fade;ctx.fillStyle='#fff';
      if(p.sq){ctx.translate(p.x,p.y);ctx.rotate(p.life*.012);ctx.fillRect(-p.r,-p.r,p.r*2,p.r*2);}
      else{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
      ctx.restore();
    });
    t++; if(!splash.classList.contains('out')) requestAnimationFrame(frame);
  }
  frame();
  let v=0;
  const pctEl=document.getElementById('sp-pct');
  const timer=setInterval(()=>{v=Math.min(100,v+(1+Math.random()*4.5));pctEl.textContent=Math.round(v)+'%';if(v>=100){clearInterval(timer);setTimeout(()=>pctEl.textContent='Hazır ✓',120);}},30);
})();

function doLogin(){

}

function startSession(){
  if(GITHUB_DATA_URL){
    loadGithubData().then(()=>{

  } else {
    if(oturum.rol==='admin') startAdmin();
    else startBayi();
  }
}

// ── GitHub'dan ürün verisi çek ──────────────────────────────────────────────
async function loadGithubData(){
  try {
    const res = await fetch(GITHUB_DATA_URL + '?nocache=' + Date.now());
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const buf = await res.arrayBuffer();
    const wb  = XLSX.read(new Uint8Array(buf), {type:'array'});
    const ws  = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
    if(!rows.length) return;

    // Tüm mevcut ürünleri temizle, GitHub'dan gelenleri yükle
    URUNLER.length = 0;
    rows.forEach((r,i)=>{
      const kod  = String(r['Takım Kodu'] || r['kod'] || '').trim();
      const ad   = String(r['Ürün Adı']  || r['ad']  || kod).trim();
      if(!kod) return;
      URUNLER.push({
        id:     i+1,
        kat:    parseInt(r['Kategori ID'] || r['kategori_id']) || null,
        kod,
        ad:     ad || kod,
        fiyat:  parseFloat(r['Fiyat'] || r['liste_fiyati'] || r['fiyat']) || 0,
        cap:    r['Takım Çapı'] ? r['Takım Çapı']+'mm' : (r['cap'] || ''),
        boy:    r['Kesme Boyu'] ? r['Kesme Boyu']+'mm' : (r['boy'] || ''),
        saft:   r['Şaft Çapı']  ? r['Şaft Çapı']+'mm'  : (r['saft'] || ''),
        birim:  String(r['Birim'] || r['birim'] || 'adet').trim(),
      });
    });
    nextId.urun = URUNLER.length + 1;
    console.log('[GitHub] ' + URUNLER.length + ' ürün yüklendi');
  } catch(e) {
    console.warn('[GitHub] Veri çekilemedi:', e.message);
  }
}

function bayiSetView(v){

function renderKategoriler(q=''){
  const kokler=KATEGORILER.filter(k=>!k.ust).sort((a,b)=>a.sira-b.sira);
  let html='';
  kokler.forEach(k=>{
    if(q&&!k.ad.toLowerCase().includes(q.toLowerCase())) return;
    const altlar=KATEGORILER.filter(c=>c.ust===k.id).sort((a,b)=>a.sira-b.sira);
    const hasAlt=altlar.length>0&&!q,isAcik=acikKatlar.has(k.id);
    html+=`<div class="kat-row">`;
    if(hasAlt) html+=`<button class="chev${isAcik?' open':''}" onclick="toggleKat(${k.id})"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></button>`;
    else html+=`<div style="width:24px"></div>`;
    html+=`<button class="kb${aktifKat===k.id?' on':''}" onclick="selectKat(${k.id})"><div class="ki" style="background:${k.renk};color:${k.stroke};font-size:13px">◈</div><span class="kn">${k.ad}</span><span class="kc">${URUNLER.filter(u=>u.kat===k.id).length}</span></button></div>`;
    if(hasAlt&&isAcik) altlar.forEach(c=>{
      html+=`<div class="alt-row kat-row"><div style="width:24px"></div><button class="kb${aktifKat===c.id?' on':''}" onclick="selectKat(${c.id})"><div class="ki" style="background:${c.renk};color:${c.stroke};font-size:11px;width:24px;height:24px">—</div><span class="kn" style="font-size:11px">${c.ad}</span><span class="kc">${URUNLER.filter(u=>u.kat===c.id).length}</span></button></div>`;
    });
  });
  document.getElementById('kat-list').innerHTML=html||`<div class="empty">Bulunamadı</div>`;
}

function toggleKat(id){acikKatlar.has(id)?acikKatlar.delete(id):acikKatlar.add(id);renderKategoriler(document.getElementById('kat-search').value);}
function filterKat(q){renderKategoriler(q);}

function selectKat(id){
  aktifKat=id;aktifUrun=null;
  document.getElementById('urun-search').value='';
  listedekiler=id?URUNLER.filter(u=>u.kat===id):[...URUNLER];
  const kat=KATEGORILER.find(k=>k.id===id);
  document.getElementById('panel-baslik').textContent=kat?kat.ad:'Tüm ürünler';
  renderKategoriler(document.getElementById('kat-search').value);
  renderUrunler(); clearDetail();
}

function filterUrun(q){
  const base=aktifKat?URUNLER.filter(u=>u.kat===aktifKat):[...URUNLER];
  listedekiler=q?base.filter(u=>u.ad.toLowerCase().includes(q.toLowerCase())||u.kod.toLowerCase().includes(q.toLowerCase())):base;
  renderUrunler();
}

function renderUrunler(){
  document.getElementById('urun-count').textContent=listedekiler.length+' ürün';
  const isk=oturum.iskonto_orani;
  if(!listedekiler.length){document.getElementById('urun-listesi').innerHTML='<div class="empty">Ürün bulunamadı</div>';return;}
  document.getElementById('urun-listesi').innerHTML=listedekiler.map(u=>{
    const n=net(u.fiyat,isk),kat=KATEGORILER.find(k=>k.id===u.kat),sel=aktifUrun&&aktifUrun.id===u.id;
    return `<div class="prow${sel?' sel':''}" onclick="selectUrun(${u.id})">
      <div class="pleft"><div class="pad">${u.ad}</div><div class="pkod">${u.kod}</div>${kat?`<span class="ppill">${kat.ad}</span>`:''}</div>
      <div class="pright"><div class="plist">${eu(u.fiyat)}</div><div class="pnet">${eu(n)}</div><div class="pisk">${pct(isk)} indirim</div></div>
    </div>`;
  }).join('');
}

function selectUrun(id){
  aktifUrun=URUNLER.find(u=>u.id===id); renderUrunler();
  const u=aktifUrun,isk=oturum.iskonto_orani,n=net(u.fiyat,isk),kazanc=Math.round((u.fiyat-n)*100)/100;
  const kat=KATEGORILER.find(k=>k.id===u.kat);
  const specs=[['Stok kodu',u.kod],u.cap&&['Takım çapı',u.cap],u.boy&&['Kesme boyu',u.boy],u.saft&&['Şaft çapı',u.saft],['Birim',u.birim],kat&&['Kategori',kat.ad]].filter(Boolean);
  document.getElementById('det-empty').style.display='none';
  document.getElementById('det-scroll').style.display='block';
  document.getElementById('det-scroll').innerHTML=`
    <div class="d-imgbox"><div class="d-imgicon">◈</div><div class="d-imgkod">${u.kod}</div></div>
    <div class="d-body">
      <div><div class="d-title">${u.ad}</div>${kat?`<div class="d-badge" style="margin-top:8px">${kat.ad}</div>`:''}</div>

        <div class="kazanc">Birim başına ${eu(kazanc)} tasarruf</div>

      <div class="specs"><div class="spec-title">Ürün bilgileri</div>${specs.map(([l,v],i,a)=>`<div class="spec-row"${i===a.length-1?' style="border-bottom:none"':''}><span class="sl">${l}</span><span class="sv">${v}</span></div>`).join('')}</div>
    </div>`;
}

function openConfirm(title,desc,onOk){
  document.getElementById('confirm-title').textContent=title;document.getElementById('confirm-desc').textContent=desc;
  document.getElementById('confirm-ok').onclick=()=>{closeConfirm();onOk();};
  document.getElementById('confirm-overlay').classList.remove('hidden');
}
function closeConfirm(){document.getElementById('confirm-overlay').classList.add('hidden');}

function toast(msg,type=''){

function modalBayiEkle(){openModal('Yeni bayi ekle',bayiFormHtml(),`<button class="btn" onclick="closeModal()">İptal</button><button class="btn btn-primary" onclick="saveBayi()">Kaydet</button>`);}
function modalBayiDuzenle(id){const b=BAYILER.find(x=>x.id===id);openModal('Bayi düzenle',bayiFormHtml(b),`<button class="btn" onclick="closeModal()">İptal</button><button class="btn btn-primary" onclick="saveBayi(${id})">Güncelle</button>`);}
function saveBayi(id){
  const firma=document.getElementById('f-firma').value.trim();
  const user=document.getElementById('f-user').value.trim();
  const pass=document.getElementById('f-pass').value;
  const isk=parseFloat(document.getElementById('f-iskonto').value)/100;
  if(!firma||(id?false:!user)||(id?false:!pass)){toast('Zorunlu alanları doldurun','error');return;}
  if(id){const b=BAYILER.find(x=>x.id===id);b.firma_adi=firma;b.iskonto_orani=isk;toast('Bayi güncellendi','success');}
  else{BAYILER.push({id:nextId.bayi++,firma_adi:firma,kullanici_adi:user,iskonto_orani:isk,aktif:1,olusturma:new Date().toISOString().slice(0,10)});toast('Bayi eklendi','success');}
  closeModal();renderBayiler();
}
function toggleBayi(id){const b=BAYILER.find(x=>x.id===id);b.aktif=b.aktif?0:1;toast(b.aktif?'Aktifleştirildi':'Pasifleştirildi','success');renderBayiler();}
function silBayi(id){const b=BAYILER.find(x=>x.id===id);openConfirm('Bayi silinsin mi?',`"${b.firma_adi}" kalıcı olarak silinecek.`,()=>{BAYILER.splice(BAYILER.findIndex(x=>x.id===id),1);toast('Bayi silindi','success');renderBayiler();});}

function modalKatDuzenle(id){const k=KATEGORILER.find(x=>x.id===id);openModal('Kategori düzenle',katFormHtml(k),`<button class="btn" onclick="closeModal()">İptal</button><button class="btn btn-primary" onclick="saveKat(${id})">Güncelle</button>`);}
function saveKat(id){
  const ad=document.getElementById('f-kat-ad').value.trim();

        </div>
      </div>
      <div class="table-wrap">
        <div class="table-header"><h2>Örnek Excel formatı</h2><button class="btn btn-sm" onclick="indir_sablon()"><svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Şablonu indir</button></div>
        <div style="padding:16px"><table style="width:100%;border-collapse:collapse;font-size:12px">
          <thead><tr><th style="text-align:left;padding:7px 12px;background:var(--p6);border-bottom:1px solid var(--border);color:var(--p1)">Takım Kodu *</th><th style="text-align:left;padding:7px 12px;background:var(--p6);border-bottom:1px solid var(--border);color:var(--muted)">Takım Çapı</th><th style="text-align:left;padding:7px 12px;background:var(--p6);border-bottom:1px solid var(--border);color:var(--muted)">Kesme Boyu</th><th style="text-align:left;padding:7px 12px;background:var(--p6);border-bottom:1px solid var(--border);color:var(--muted)">Şaft Çapı</th><th style="text-align:left;padding:7px 12px;background:var(--p6);border-bottom:1px solid var(--border);color:var(--p1)">Fiyat *</th></tr></thead>
          <tbody><tr><td style="padding:7px 12px;border-bottom:1px solid var(--border);font-family:monospace;color:var(--muted)">MHK-FRZ-001</td><td style="padding:7px 12px;border-bottom:1px solid var(--border)">6</td><td style="padding:7px 12px;border-bottom:1px solid var(--border)">13</td><td style="padding:7px 12px;border-bottom:1px solid var(--border)">6</td><td style="padding:7px 12px;border-bottom:1px solid var(--border)">12.50</td></tr></tbody>
        </table></div>
      </div>
    </div>`;
  setupDrop();
}

function exportForGithub(){
  // Tüm ürünleri GitHub formatında xlsx olarak indir
  const rows = URUNLER.map(u=>{
    const kat = KATEGORILER.find(k=>k.id===u.kat);
    return {
      'Takım Kodu'  : u.kod,
      'Ürün Adı'   : u.ad,
      'Kategori ID' : u.kat || '',
      'Kategori Adı': kat ? kat.ad : '',
      'Fiyat'       : u.fiyat,
      'Takım Çapı'  : u.cap  ? u.cap.replace('mm','')  : '',
      'Kesme Boyu'  : u.boy  ? u.boy.replace('mm','')  : '',
      'Şaft Çapı'   : u.saft ? u.saft.replace('mm','') : '',
      'Birim'       : u.birim || 'adet',
    };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:18},{wch:24},{wch:12},{wch:18},{wch:10},{wch:12},{wch:12},{wch:12},{wch:8}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Ürünler');
  XLSX.writeFile(wb, 'urunler.xlsx');
  toast(URUNLER.length + ' ürün dışa aktarıldı — GitHub\'a yükleyin', 'success');
}

function setupDrop(){
  const dz=document.getElementById('drop-zone');if(!dz)return;
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag');handleFile({files:e.dataTransfer.files});});
}

function handleFile(inp){
  const file=inp.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    let wb;try{wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});}catch{toast('Dosya okunamadı','error');return;}
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
    if(!rows.length){toast('Dosyada veri bulunamadı','error');return;}
    importData=rows.map(row=>{const out={};Object.entries(row).forEach(([h,v])=>{const k=matchCol(h);if(k)out[k]=String(v).trim();});return out;}).filter(r=>r['takım_kodu']);
    if(!importData.length){toast('Takım Kodu sütunu bulunamadı','error');return;}
    const COLS=['takım_kodu','takım_çapı','kesme_boyu','şaft_çapı','fiyat'];
    const LABELS={'takım_kodu':'Takım Kodu','takım_çapı':'Takım Çapı','kesme_boyu':'Kesme Boyu','şaft_çapı':'Şaft Çapı','fiyat':'Fiyat'};
    document.getElementById('import-preview').innerHTML=`<div style="font-size:12px;color:var(--muted);margin:14px 0 8px"><strong>${importData.length}</strong> satır okundu</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr>${COLS.map(k=>`<th style="text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);background:var(--p6);color:var(--muted);font-weight:600">${LABELS[k]}</th>`).join('')}</tr></thead>
      <tbody>${importData.slice(0,5).map(r=>`<tr>${COLS.map(k=>{let v=r[k]||'—';if((k==='takım_çapı'||k==='kesme_boyu'||k==='şaft_çapı')&&r[k])v=r[k]+'mm';if(k==='fiyat'&&r[k])v='€'+parseFloat(r[k]).toFixed(2);return `<td style="padding:7px 10px;border-bottom:1px solid var(--border)">${escHtml(String(v))}</td>`;}).join('')}</tr>`).join('')}</tbody></table>`;
    document.getElementById('import-actions').innerHTML=`<button class="btn btn-primary" onclick="doImport()">İçe aktar (${importData.length} ürün)</button>`;
  };reader.readAsArrayBuffer(file);
}

function indir_sablon(){
  const ws=XLSX.utils.aoa_to_sheet([['Takım Kodu','Takım Çapı','Kesme Boyu','Şaft Çapı','Fiyat'],['MHK-FRZ-001',6,13,6,12.50]]);
  ws['!cols']=[{wch:18},{wch:12},{wch:12},{wch:12},{wch:10}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Ürünler');XLSX.writeFile(wb,'miheng_sablon.xlsx');
}

function doImport(){
  const katId=parseInt(document.getElementById('import-kat').value)||null;
  let eklenen=0,guncellenen=0;
  importData.forEach(r=>{
    const kod=r['takım_kodu'],cap=r['takım_çapı']?r['takım_çapı']+'mm':'',boy=r['kesme_boyu']?r['kesme_boyu']+'mm':'',saft=r['şaft_çapı']?r['şaft_çapı']+'mm':'',fiyat=parseFloat(r['fiyat'])||0;
    const mevcut=URUNLER.find(u=>u.kod===kod);
    if(mevcut){Object.assign(mevcut,{kat:katId,fiyat,cap,boy,saft});guncellenen++;}
    else{URUNLER.push({id:nextId.urun++,kod,ad:kod,kat:katId,fiyat,cap,boy,saft,birim:'adet',aktif:1});eklenen++;}
  });
  toast(`${eklenen} eklendi, ${guncellenen} güncellendi`,'success');
  importData=[];document.getElementById('import-preview').innerHTML='';document.getElementById('import-actions').innerHTML='';
}
</script>
